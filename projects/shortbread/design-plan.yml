sources:
  shortbread:
    type: vector
    tiles:
      - https://vector.openstreetmap.org/shortbread_v1/{z}/{x}/{y}.mvt
    maxzoom: 14

rules:
  - symbol_id:
      - background
  - symbol_id:
      - 101-contour
    links:
      - source: contour-source
        source-layer: contours
  - symbol_id:
      - 202-cliff
    links:
      - source: shortbread
        source-layer: pier_lines
        filter:
          - in
          - kind
          - breakwater
          - groyne
  - symbol_id:
      - 206-gigantic-boulder
    links:
      - source: shortbread
        source-layer: pier_polygons
        filter:
          - in
          - kind
          - breakwater
          - groyne
  - symbol_id:
      - 208-boulder-field
    links:
      - source: shortbread
        source-layer: land
        filter:
          - in
          - kind
          - rock
          - shingle
          - scree
  - symbol_id:
      - 213-sandy-ground
    links:
      - source: shortbread
        source-layer: land
        filter:
          - in
          - kind
          - sand
          - beach
  - symbol_id:
      - 214-bare-rock
    links:
      - source: shortbread
        source-layer: land
        filter:
          - "=="
          - kind
          - bare_rock
  - symbol_id:
      - 301-uncrossable-water
    links:
      - source: shortbread
        source-layer: ocean
      - source: shortbread
        source-layer: water_polygons
  - symbol_id:
      - 304-river
    links:
      - source: shortbread
        source-layer: water_lines
        filter:
          - all
          - - "!="
            - tunnel
            - true
          - - "in"
            - kind
            - river
            - canal
  - symbol_id:
      - 304-stream
    links:
      - source: shortbread
        source-layer: water_lines
        filter:
          - all
          - - "!="
            - tunnel
            - true
          - - in
            - kind
            - stream
            - ditch
  - symbol_id:
      - 307-uncrossable-marsh
    links:
      - source: shortbread
        source-layer: land
        filter:
          - in
          - kind
          - marsh
          - swamp
          - bog
          - string_bog
          - wet_meadow
          - marsh
  - symbol_id:
      - 401-open-land
    links:
      - source: shortbread
        source-layer: land
        filter:
          - all
          - - in
            - kind
            - grass
            - playground
  - symbol_id:
      - 403-rough-open-land
    links:
      - source: shortbread
        source-layer: land
        filter:
          - in
          - subkind
          - meadow
          - grassland
          - heath
  - symbol_id:
      - 405-forest
    links:
      - source: shortbread
        source-layer: land
        filter:
          - in
          - kind
          - forest
          - park
          - village_green
          - garden
  - symbol_id:
      - 408-vegetation-walk
    links:
      - source: shortbread
        source-layer: land
        filter:
          - any
          - - ==
            - subkind
            - scrub
  - symbol_id:
      - 412-cultivated-land
    links:
      - source: shortbread
        source-layer: land
        filter:
          - in
          - kind
          - farmyard
          - farmland
          - allotments
  - symbol_id:
      - 413-orchard
    links:
      - source: shortbread
        source-layer: land
        filter:
          - in
          - kind
          - orchard
          - vineyard
  - symbol_id:
      - 501-paved-area
      - 501-paved-area-casing
    links:
      - source: shortbread
        source-layer: street_polygons
        filter:
          - "!="
          - tunnel
          - true
      - source: shortbread
        source-layer: pier_polygons
        filter:
          - all
          - - "!="
            - kind
            - breakwater
          - - "!="
            - kind
            - groyne
      - source: shortbread
        source-layer: pier_lines
        filter:
          - all
          - - "!="
            - kind
            - breakwater
          - - "!="
            - kind
            - groyne
  - symbol_id:
      - 502-1-aeroway-taxiway-center
      - 502-2-aeroway-taxiway-outline
    links:
      - source: shortbread
        source-layer: aeroway
        filter:
          - all
          - - "=="
            - kind
            - taxiway
  - symbol_id:
