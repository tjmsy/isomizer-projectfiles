  - symbol_id:
      - 504-vehicle-track
    links:
      - source: shortbread
        source-layer: streets
        filter:
          - all
          - - "!="
            - tunnel
            - true
          - - "=="
            - kind
            - track
  - symbol_id:
      - 505-footpath
