            - tunnel
            - true
          - - any
            - - "=="
              - kind
              - rail
            - - "=="
              - rail
              - true
  - symbol_id:
      - 520-out-of-bounds
    links:
      - source: shortbread
        source-layer: sites
        filter:
          - in
          - kind
          - danger_area
          - sports_centre
          - university
          - commercial
          - college
          - school
          - hospital
          - prison
          - parking
          - bicycle_parking
          - construction
      - source: shortbread
        source-layer: land
        filter:
          - in
          - kind
          - golf_course
          - miniature_golf
          - residential
          - industrial
          - commercial
          - garages
          - retail
          - railway
          - quarry
          - greenfield
          - brownfield
  - symbol_id:
      - 521-building
    links:
